<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educator Dashboard - Edu Fairuzullah LMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>Edu Fairuzullah LMS</h2>
            <div class="nav-user">
                <span id="userName"></span>
                <span id="userRole" class="role-badge role-educator">Educator</span>
                <button onclick="logout()" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1>Educator Dashboard</h1>
            <button onclick="showCourseModal()" class="btn btn-primary">+ Create New Course</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('courses')">My Courses</button>
            <button class="tab-btn" onclick="showTab('users')">User Management</button>
        </div>

        <!-- Courses Tab -->
        <div id="coursesTab" class="tab-content active">
            <div id="coursesList" class="courses-grid">
                <!-- Courses will be loaded here -->
            </div>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content">
            <div class="section-header">
                <h2>User Management</h2>
                <button onclick="showUserModal()" class="btn btn-primary">+ Add New User</button>
            </div>
            <div id="usersList" class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Course Modal -->
    <div id="courseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCourseModal()">&times;</span>
            <h2 id="courseModalTitle">Create New Course</h2>
            <form id="courseForm" onsubmit="saveCourse(event)">
                <input type="hidden" id="courseId">
                <div class="form-group">
                    <label for="courseTitle">Course Title:</label>
                    <input type="text" id="courseTitle" required>
                </div>
                <div class="form-group">
                    <label for="courseDescription">Description:</label>
                    <textarea id="courseDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="courseCategory">Category:</label>
                    <input type="text" id="courseCategory" required>
                </div>
                <div class="form-group">
                    <label for="courseDuration">Duration (hours):</label>
                    <input type="number" id="courseDuration" min="1" required>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeCourseModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Course</button>
                </div>
            </form>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUserModal()">&times;</span>
            <h2 id="userModalTitle">Add New User</h2>
            <form id="userForm" onsubmit="saveUser(event)">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="userNameInput">Full Name:</label>
                    <input type="text" id="userNameInput" required>
                </div>
                <div class="form-group">
                    <label for="userEmailInput">Email:</label>
                    <input type="email" id="userEmailInput" required>
                </div>
                <div class="form-group">
                    <label for="userPasswordInput">Password:</label>
                    <input type="password" id="userPasswordInput" minlength="6">
                    <small>Leave blank to keep existing password</small>
                </div>
                <div class="form-group">
                    <label for="userRoleInput">Role:</label>
                    <select id="userRoleInput" required>
                        <option value="educator">Educator</option>
                        <option value="learner">Learner</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeUserModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Materials Modal -->
    <div id="materialsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeMaterialsModal()">&times;</span>
            <h2 id="materialsModalTitle">Course Materials</h2>
            <div id="materialsCourseTitle" style="margin-bottom: 10px; color: #c71585;"></div>
            <form id="materialForm" onsubmit="saveMaterial(event)">
                <input type="hidden" id="materialCourseId">
                <div class="form-group">
                    <label for="materialTitle">Title:</label>
                    <input type="text" id="materialTitle" required>
                </div>
                <div class="form-group">
                    <label for="materialUrl">Material URL (link to file/video/doc):</label>
                    <input type="url" id="materialUrl" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="materialDescription">Description (optional):</label>
                    <textarea id="materialDescription" rows="3" placeholder="Short description"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeMaterialsModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Material</button>
                </div>
            </form>
            <div style="margin-top:20px;">
                <h3>Existing Materials</h3>
                <div id="materialsList" class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Link</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="materialsTableBody">
                            <!-- materials rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Check authentication
        window.onload = async function() {
            const currentUser = getCurrentUser();
            if (!currentUser || currentUser.role !== 'educator') {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userName').textContent = currentUser.name;
            await loadCourses();
            await loadUsers();
        };

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        async function showCourseModal(courseId = null) {
            const modal = document.getElementById('courseModal');
            const form = document.getElementById('courseForm');
            const title = document.getElementById('courseModalTitle');

            if (courseId) {
                const course = await getCourseById(courseId);
                if (course) {
                    title.textContent = 'Edit Course';
                    document.getElementById('courseId').value = course.id;
                    document.getElementById('courseTitle').value = course.title;
                    document.getElementById('courseDescription').value = course.description;
                    document.getElementById('courseCategory').value = course.category;
                    document.getElementById('courseDuration').value = course.duration;
                }
            } else {
                title.textContent = 'Create New Course';
                form.reset();
                document.getElementById('courseId').value = '';
            }
            modal.style.display = 'block';
        }

        function closeCourseModal() {
            document.getElementById('courseModal').style.display = 'none';
            document.getElementById('courseForm').reset();
        }

        async function showUserModal(userId = null) {
            const modal = document.getElementById('userModal');
            const form = document.getElementById('userForm');
            const title = document.getElementById('userModalTitle');

            if (userId) {
                const user = await getUserById(userId);
                if (user) {
                    title.textContent = 'Edit User';
                    document.getElementById('userId').value = user.id;
                    document.getElementById('userNameInput').value = user.name;
                    document.getElementById('userEmailInput').value = user.email;
                    document.getElementById('userRoleInput').value = user.role;
                    document.getElementById('userPasswordInput').required = false;
                }
            } else {
                title.textContent = 'Add New User';
                form.reset();
                document.getElementById('userId').value = '';
                document.getElementById('userPasswordInput').required = true;
            }
            modal.style.display = 'block';
        }

        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
            document.getElementById('userForm').reset();
        }

        async function saveCourse(event) {
            event.preventDefault();
            const courseId = document.getElementById('courseId').value;
            const course = {
                title: document.getElementById('courseTitle').value,
                description: document.getElementById('courseDescription').value,
                category: document.getElementById('courseCategory').value,
                duration: parseInt(document.getElementById('courseDuration').value),
                educatorId: getCurrentUser().id
            };

            try {
                if (courseId) {
                    await updateCourse(courseId, course);
                } else {
                    await createCourse(course);
                }
                closeCourseModal();
                await loadCourses();
            } catch (error) {
                alert('Error saving course: ' + error.message);
            }
        }

        async function saveUser(event) {
            event.preventDefault();
            const userId = document.getElementById('userId').value;
            const user = {
                name: document.getElementById('userNameInput').value,
                email: document.getElementById('userEmailInput').value,
                role: document.getElementById('userRoleInput').value
            };

            const password = document.getElementById('userPasswordInput').value;
            if (password) {
                user.password = password;
            }

            try {
                if (userId) {
                    await updateUser(userId, user);
                } else {
                    await createUser(user);
                }
                closeUserModal();
                await loadUsers();
            } catch (error) {
                alert('Error saving user: ' + error.message);
            }
        }

        async function loadCourses() {
            try {
                const courses = await getCoursesByEducator(getCurrentUser().id);
                const container = document.getElementById('coursesList');

                if (courses.length === 0) {
                    container.innerHTML = '<p class="empty-state">No courses created yet. Click "Create New Course" to get started.</p>';
                    return;
                }

                container.innerHTML = courses.map(course => `
                    <div class="course-card">
                        <h3>${escapeHtml(course.title)}</h3>
                        <p class="course-category">${escapeHtml(course.category)}</p>
                        <p class="course-description">${escapeHtml(course.description)}</p>
                        <div class="course-meta">
                            <span>Duration: ${course.duration} hours</span>
                        </div>
                        <div class="course-actions">
                            <button onclick="showCourseModal(${course.id})" class="btn btn-sm btn-primary">Edit</button>
                            <button onclick="openMaterialsModal(${course.id}, '${escapeHtml(course.title)}')" class="btn btn-sm btn-secondary">Materials</button>
                            <button onclick="deleteCourse(${course.id})" class="btn btn-sm btn-danger">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('coursesList').innerHTML = '<p class="empty-state">Error loading courses. Please check if the server is running.</p>';
            }
        }

        async function loadUsers() {
            try {
                const users = await getAllUsers();
                const tbody = document.getElementById('usersTableBody');

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${escapeHtml(user.name)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td><span class="role-badge role-${user.role}">${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</span></td>
                        <td>
                            <button onclick="showUserModal(${user.id})" class="btn btn-sm btn-primary">Edit</button>
                            <button onclick="deleteUser(${user.id})" class="btn btn-sm btn-danger">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="5">Error loading users. Please check if the server is running.</td></tr>';
            }
        }

        async function deleteCourse(courseId) {
            if (confirm('Are you sure you want to delete this course?')) {
                try {
                    await removeCourse(courseId);
                    await loadCourses();
                } catch (error) {
                    alert('Error deleting course: ' + error.message);
                }
            }
        }

        async function deleteUser(userId) {
            const currentUser = getCurrentUser();
            if (userId === currentUser.id) {
                alert('You cannot delete your own account!');
                return;
            }
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    await removeUser(userId);
                    await loadUsers();
                } catch (error) {
                    alert('Error deleting user: ' + error.message);
                }
            }
        }

        // =============================
        // Materials handling
        // =============================
        async function openMaterialsModal(courseId, courseTitle) {
            document.getElementById('materialsModal').style.display = 'block';
            document.getElementById('materialCourseId').value = courseId;
            document.getElementById('materialsCourseTitle').textContent = `Course: ${courseTitle}`;
            document.getElementById('materialForm').reset();
            await loadMaterialsTable(courseId);
        }

        function closeMaterialsModal() {
            document.getElementById('materialsModal').style.display = 'none';
            document.getElementById('materialsTableBody').innerHTML = '';
        }

        async function loadMaterialsTable(courseId) {
            const tbody = document.getElementById('materialsTableBody');
            tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
            try {
                const materials = await getMaterials(courseId);
                if (!materials || materials.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No materials yet.</td></tr>';
                    return;
                }
                tbody.innerHTML = materials.map(m => `
                    <tr>
                        <td>${escapeHtml(m.title)}</td>
                        <td>${escapeHtml(m.description || '')}</td>
                        <td><a href="${m.materialUrl}" target="_blank">Open</a></td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="removeMaterial(${m.id}, ${courseId})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4">Error loading materials: ${error.message}</td></tr>`;
            }
        }

        async function saveMaterial(event) {
            event.preventDefault();
            const courseId = document.getElementById('materialCourseId').value;
            const title = document.getElementById('materialTitle').value;
            const materialUrl = document.getElementById('materialUrl').value;
            const description = document.getElementById('materialDescription').value;
            try {
                await createMaterial({ courseId, title, materialUrl, description });
                document.getElementById('materialForm').reset();
                await loadMaterialsTable(courseId);
            } catch (error) {
                alert('Error saving material: ' + error.message);
            }
        }

        async function removeMaterial(materialId, courseId) {
            if (!confirm('Delete this material?')) return;
            try {
                await deleteMaterial(materialId);
                await loadMaterialsTable(courseId);
            } catch (error) {
                alert('Error deleting material: ' + error.message);
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const courseModal = document.getElementById('courseModal');
            const userModal = document.getElementById('userModal');
            const materialsModal = document.getElementById('materialsModal');
            if (event.target === courseModal) {
                closeCourseModal();
            }
            if (event.target === userModal) {
                closeUserModal();
            }
            if (event.target === materialsModal) {
                closeMaterialsModal();
            }
        }
    </script>
</body>
</html>
