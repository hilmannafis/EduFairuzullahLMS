<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Fairuzullah LMS - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <h1>Edu Fairuzullah LMS</h1>
            <p class="subtitle">Learning Management System</p>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-section active">
                <h2>Login</h2>
                <form id="loginFormElement" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p class="switch-form">
                    Don't have an account? <a href="#" onclick="showRegister()">Register here</a>
                </p>
            </div>

            <!-- Registration Form -->
            <div id="registerForm" class="form-section">
                <h2>Register</h2>
                <form id="registerFormElement" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="regName">Full Name:</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email:</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password:</label>
                        <input type="password" id="regPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="regRole">Role:</label>
                        <select id="regRole" required>
                            <option value="">Select Role</option>
                            <option value="educator">Educator</option>
                            <option value="learner">Learner</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <p class="switch-form">
                    Already have an account? <a href="#" onclick="showLogin()">Login here</a>
                </p>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
